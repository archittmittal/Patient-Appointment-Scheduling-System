# ============================================================================
# Patient Appointment Scheduling System - Application Configuration
# ============================================================================

spring.application.name=Patient Appointment Scheduling System

# ==================== DATABASE ====================
spring.datasource.url=jdbc:mysql://localhost:3306/hospital_db?useSSL=false&serverTimezone=Asia/Kolkata&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==================== JPA / HIBERNATE ====================
# validate = only validate schema matches entities (we manage schema via SQL files)
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false

# ==================== SERVER ====================
server.port=8080
server.servlet.context-path=/api

# ==================== JACKSON (JSON) ====================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.time-zone=Asia/Kolkata
spring.jackson.date-format=yyyy-MM-dd HH:mm:ss

# ==================== LOGGING ====================
logging.level.com.hospital=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=WARN
